<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blind Stopwatch</title>
<style>
    body {
        margin:0;
        background:white;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:40px;
        user-select:none;
        transition:background 0.1s;
    }

    .black {
        background:black;
        color:white;
    }

    .flash {
        background:white !important;
    }
</style>
</head>
<body>

<div id="display">Ready</div>

<script>
let startTime = 0;
let timer;
let running = false;
let laps = [];
let lastLapTime = 0;

const display = document.getElementById("display");
const body = document.body;

function startTimer() {
    startTime = Date.now();
    lastLapTime = 0;
    laps = [];
    running = true;
    body.classList.add("black");
    display.style.display = "none";

    timer = setInterval(() => {
        let now = Date.now();
        let diff = now - startTime;

        let seconds = Math.floor(diff / 1000);
        let tenth = Math.floor((diff % 1000) / 100);

        display.textContent = seconds + "." + tenth;
    }, 100);
}

function recordLap() {
    if (!running) return;

    let now = Date.now();
    let diff = now - startTime;

    let gap = diff - lastLapTime;
    lastLapTime = diff;

    laps.push(gap);

    // ✅ 반짝임 효과
    body.classList.add("flash");
    setTimeout(() => {
        body.classList.remove("flash");
    }, 100);
}

function stopTimer() {
    if (!running) return;

    clearInterval(timer);
    running = false;
    body.classList.remove("black");
    display.style.display = "block";

    console.log("=== 랩 간격 ===");
    laps.forEach((lap, i) => {
        console.log((i+1) + "구간:", (lap/1000).toFixed(1) + "초");
    });
}

// ✅ 클릭 처리
body.addEventListener("click", (e) => {
    if (!running) {
        startTimer();
    } else {
        recordLap();
    }
});

// ✅ 더블클릭은 클릭과 겹치지 않도록 분리
body.addEventListener("dblclick", (e) => {
    stopTimer();
});
</script>

</body>
</html>
